name: Cloud Portfolio CI/CD Pipeline

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # Backend Build & Test
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Backend Dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Lint Backend Code
        run: |
          cd backend
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings.
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      # Frontend Build Test
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Frontend Dependencies & Test Build
        env:
          CI: false
        run: |
          cd frontend
          npm install --legacy-peer-deps
          npm run build --if-present

  docker-build-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 1. Build and Push Database Image
      - name: Build & Push Database Image
        uses: docker/build-push-action@v4
        with:
          context: ./db
          push: true
          tags: |
            sufyexpert/fa23-bcs-161-database:FA23-BCS-161
            sufyexpert/fa23-bcs-161-database:${{ github.sha }}

      # 2. Build and Push Backend Image
      - name: Build & Push Backend Image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: |
            sufyexpert/fa23-bcs-161-backend:FA23-BCS-161
            sufyexpert/fa23-bcs-161-backend:${{ github.sha }}

      # 3. Build and Push Frontend Image
      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: |
            sufyexpert/fa23-bcs-161-frontend:FA23-BCS-161
            sufyexpert/fa23-bcs-161-frontend:${{ github.sha }}

  deploy-to-aks:
    needs: docker-build-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy Database and Services to AKS
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          kubectl config use-context FA23-BCS-161-Clust
          kubectl apply -f k8s/postgres-deployment.yaml
          kubectl apply -f k8s/postgres-service.yaml
          kubectl apply -f k8s/backend-service.yaml
          kubectl apply -f k8s/backend-deployment.yaml
          kubectl apply -f k8s/frontend-service.yaml
          kubectl apply -f k8s/frontend-deployment.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Trigger Rollout Update
        run: |
          kubectl rollout restart deployment/postgres-deployment
          kubectl rollout restart deployment/backend-deployment
          kubectl rollout restart deployment/frontend-deployment

      - name: Verify Deployment Status
        run: |
          kubectl rollout status deployment/postgres-deployment --timeout=60s
          kubectl rollout status deployment/backend-deployment --timeout=60s
          kubectl rollout status deployment/frontend-deployment --timeout=120s
